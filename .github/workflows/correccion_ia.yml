name: Corrector Automático con IA

# Solo se ejecuta si alguien sube cosas dentro de la carpeta "entregas"
on:
  push:
    paths:
      - 'entregas/**'

jobs:
  evaluar_codigo:
    runs-on: ubuntu-latest
    
    # Importante: le damos permiso explícito para escribir en el repo
    permissions:
      contents: write

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai python-dotenv
      - name: Ejecutar la corrección con IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python corregir_con_ia.py

      # NUEVO PASO: Guardar los cambios que haya generado el script de Python
      - name: Subir la corrección al repositorio
        run: |
          git config --global user.name "Bot Corrector IA"
          git config --global user.email "bot@corrector.ia"
          git add correcciones/
          # Solo hace commit si hay archivos nuevos
          git commit -m "📝 Nueva corrección generada por IA" || echo "No hay cambios para subir"
          git push
