name: Corrector con IA

# Esto le dice a GitHub que ejecute el script cada vez que alguien haga un push
on:
  push:
    branches: [ "main", "master" ]

jobs:
  evaluar_codigo:
    # Usamos un servidor de Linux gratuito de GitHub
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descargar el código que el alumno acaba de subir
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      # Paso 2: Instalar Python en el servidor
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Paso 3: Instalar la librería para conectar con Gemini
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai

      # Paso 4: Ejecutar el script de tu compañero pasándole la clave oculta
      - name: Ejecutar la corrección con IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python corregir_con_ia.py
